<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Signal Multi-Account Manager</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-weak: #eef2f7;
        --text: #171a20;
        --muted: #687385;
        --line: #d9dee8;
        --accent: #2563eb;
        --accent-weak: #dbeafe;
        --danger: #c2410c;
        --ok: #15803d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
          sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      .topbar {
        display: flex;
        align-items: end;
        gap: 8px;
        min-width: 0;
        padding: 12px 16px 0;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .tabs {
        display: flex;
        min-width: 0;
        flex: 1;
        gap: 4px;
        overflow-x: auto;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 120px;
        max-width: 200px;
        height: 40px;
        padding: 0 14px;
        border: 1px solid transparent;
        border-bottom: 0;
        border-radius: 8px 8px 0 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
      }

      .tab.active {
        border-color: var(--line);
        background: var(--bg);
        color: var(--text);
      }

      .tab-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #94a3b8;
      }

      .status-dot.running {
        background: var(--ok);
      }

      .status-dot.error {
        background: var(--danger);
      }

      .top-actions {
        display: flex;
        gap: 8px;
        padding-bottom: 8px;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 16px;
        min-height: 0;
        padding: 16px;
      }

      .main,
      .side {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .summary {
        display: grid;
        gap: 12px;
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      .summary h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 650;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 16px;
        color: var(--muted);
      }

      .meta code {
        color: var(--text);
        word-break: break-all;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        font: inherit;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.danger {
        border-color: #fed7aa;
        background: #fff7ed;
        color: var(--danger);
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      .log {
        min-height: 0;
        margin: 0;
        overflow: auto;
        padding: 14px 18px;
        background: #0f172a;
        color: #dbeafe;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
        white-space: pre-wrap;
      }

      .side {
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
      }

      .side h2 {
        margin: 0;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }

      .accounts {
        overflow: auto;
        padding: 8px;
      }

      .account-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        text-align: left;
      }

      .account-row.active {
        background: var(--accent-weak);
      }

      .account-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
      }

      .account-status {
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 100%;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="tabs" id="tabs"></div>
        <div class="top-actions">
          <button id="ensureAll">Create configs</button>
          <button id="openManagerConfig">Accounts file</button>
        </div>
      </header>
      <main class="content">
        <section class="main" id="main"></section>
        <aside class="side">
          <h2>Accounts</h2>
          <div class="accounts" id="accounts"></div>
        </aside>
      </main>
    </div>

    <script>
      const api = window.multiAccountManager;
      let state = { accounts: [] };
      let activeId;

      function getActiveAccount() {
        return (
          state.accounts.find(account => account.id === activeId) ||
          state.accounts[0]
        );
      }

      function setState(nextState) {
        state = nextState;
        if (!activeId && state.accounts.length > 0) {
          activeId = state.accounts[0].id;
        }
        render();
      }

      function selectAccount(id) {
        activeId = id;
        render();
        const account = getActiveAccount();
        if (account?.status === 'running') {
          api.focus(id);
        }
      }

      function statusClass(status) {
        if (status === 'running' || status === 'error') {
          return status;
        }
        return '';
      }

      function renderTabs() {
        const tabs = document.getElementById('tabs');
        tabs.replaceChildren(
          ...state.accounts.map(account => {
            const button = document.createElement('button');
            button.className = `tab ${account.id === activeId ? 'active' : ''}`;
            button.addEventListener('click', () => selectAccount(account.id));
            button.innerHTML = `
              <span class="status-dot ${statusClass(account.status)}"></span>
              <span class="tab-label"></span>
            `;
            button.querySelector('.tab-label').textContent = account.label;
            return button;
          })
        );
      }

      function renderAccounts() {
        const accounts = document.getElementById('accounts');
        accounts.replaceChildren(
          ...state.accounts.map(account => {
            const button = document.createElement('button');
            button.className = `account-row ${
              account.id === activeId ? 'active' : ''
            }`;
            button.addEventListener('click', () => selectAccount(account.id));
            button.innerHTML = `
              <span class="status-dot ${statusClass(account.status)}"></span>
              <span>
                <span class="account-name"></span>
                <span class="account-status"></span>
              </span>
              <span>${account.profileConfigExists ? 'ready' : 'setup'}</span>
            `;
            button.querySelector('.account-name').textContent = account.label;
            button.querySelector('.account-status').textContent =
              account.status;
            return button;
          })
        );
      }

      function renderMain() {
        const main = document.getElementById('main');
        const account = getActiveAccount();

        if (!account) {
          main.innerHTML = '<div class="empty">No accounts configured.</div>';
          return;
        }

        const logText =
          account.log.length > 0 ? account.log.join('\n') : 'No log output yet.';
        main.innerHTML = `
          <div class="summary">
            <h1></h1>
            <div class="meta">
              <span>Status: <code>${account.status}</code></span>
              <span>PID: <code>${account.pid || 'none'}</code></span>
              <span>Instance: <code></code></span>
              <span>Storage profile: <code></code></span>
              <span>Config: <code></code></span>
              <span>User data: <code></code></span>
            </div>
            <div class="actions">
              <button class="primary" id="startBtn">Start / Focus</button>
              <button id="focusBtn">Focus</button>
              <button id="restartBtn">Restart</button>
              <button class="danger" id="stopBtn">Stop</button>
              <button id="ensureBtn">Create config</button>
              <button id="configBtn">Show config</button>
              <button id="dataBtn">Open data folder</button>
            </div>
          </div>
          <pre class="log"></pre>
        `;

        main.querySelector('h1').textContent = account.label;
        const codes = main.querySelectorAll('.meta code');
        codes[2].textContent = account.id;
        codes[3].textContent = account.storageProfile;
        codes[4].textContent = account.profileConfigPath;
        codes[5].textContent = account.userDataPath;
        main.querySelector('.log').textContent = logText;

        main
          .querySelector('#startBtn')
          .addEventListener('click', () => api.start(account.id));
        main
          .querySelector('#focusBtn')
          .addEventListener('click', () => api.focus(account.id));
        main
          .querySelector('#restartBtn')
          .addEventListener('click', () => api.restart(account.id));
        main
          .querySelector('#stopBtn')
          .addEventListener('click', () => api.stop(account.id));
        main
          .querySelector('#ensureBtn')
          .addEventListener('click', () => api.ensureConfig(account.id));
        main
          .querySelector('#configBtn')
          .addEventListener('click', () => api.openProfileConfig(account.id));
        main
          .querySelector('#dataBtn')
          .addEventListener('click', () => api.openDataPath(account.id));
      }

      function render() {
        renderTabs();
        renderMain();
        renderAccounts();
      }

      document
        .getElementById('ensureAll')
        .addEventListener('click', () => api.ensureAllConfigs());
      document
        .getElementById('openManagerConfig')
        .addEventListener('click', () => api.openManagerConfig());

      api.onState(setState);
      api.getState().then(setState);
    </script>
  </body>
</html>
